name: CI/CD API

on:
  push:
  pull_request:

env:
  PROJECT_NAME: odh-tourism-api
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}/${{ github.event.repository.name }}-api
  DOCKER_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: true
    - name: REUSE Compliance Check
      uses: fsfe/reuse-action@v1
    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '8.0.x'
    - name: Restore dependencies
      run: dotnet restore OdhApiCore.sln
    - name: Build OdhApiCore Solution
      run: dotnet build OdhApiCore.sln --no-restore
    - name: Test
      run: dotnet test OdhApiCore --filter Category!=Integration

  # Deploy Test (Kubernetes / EKS)
  deploy-test-api:
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    needs: test
    environment: test
    concurrency: deploy-test-api
    env:
      API_URL: "https://tourism.api.dev.testingmachine.eu/v1/"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v2
        with:
          submodules: true

      - name: Setup config
        run: |
            echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_NOICOMMUNITY }}" > google-service-account.noicommunity.json
            chmod +r google-service-account.noicommunity.json

      - name: Build and push
        uses: noi-techpark/github-actions/docker-build-and-push@v2
        with:
          docker-username: ${{ github.actor }}
          docker-password: ${{ secrets.GITHUB_TOKEN }}
          working-directory: OdhApiCore
          docker-compose-file: docker-compose.yml

      # https://github.com/shrink/actions-docker-registry-tag
      - name: Add an "unstable" docker tag
        uses: shrink/actions-docker-registry-tag@v4
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}/${{ github.event.repository.name }}-api
          target: ${{ env.DOCKER_TAG }}
          tags: |
            unstable

      - name: Customize test.yaml
        env:
          IMAGE: ${{ env.DOCKER_IMAGE }}
          TAG: ${{ env.DOCKER_TAG }}
          PG_CONNECTION: ${{ secrets.PG_CONNECTION_TEST }}
          MSS_USER: ${{ secrets.MSS_USER_TEST }}
          MSS_PSWD: ${{ secrets.MSS_PSWD_TEST }}
          LCS_USER: ${{ secrets.LCS_USER_TEST }}
          LCS_PSWD: ${{ secrets.LCS_PSWD_TEST }}
          LCS_MSGPSWD: ${{ secrets.LCS_MSGPSWD_TEST }}
          SIAG_USER: ${{ secrets.SIAG_USER_TEST }}
          SIAG_PSWD: ${{ secrets.SIAG_PSWD_TEST }}
          S3_BUCKET_ACCESSPOINT: ${{ secrets.S3_BUCKET_ACCESSPOINT_TEST }}
          S3_IMAGEUPLOADER_ACCESSKEY: ${{ secrets.S3_IMAGEUPLOADER_ACCESSKEY_TEST }}
          S3_IMAGEUPLOADER_SECRETKEY: ${{ secrets.S3_IMAGEUPLOADER_SECRETKEY_TEST }}
          CADDY_TEST_IP: ${{ secrets.CADDY_TEST_IP }}
          CADDY_PROD_IP: ${{ secrets.CADDY_PROD_IP }}
          ELK_URL: ${{ secrets.ELK_URL_TEST }}
          ELK_TOKEN: ${{ secrets.ELK_TOKEN_TEST }}
          RAVEN_USER: ${{ secrets.RAVEN_USER_TEST }}
          RAVEN_PSWD: ${{ secrets.RAVEN_PSWD_TEST }}
          NOICOMMUNITY_SERVERKEY: ${{ secrets.NOICOMMUNITY_SERVERKEY_TEST }}
          NOICOMMUNITY_SENDERID: ${{ secrets.NOICOMMUNITY_SENDERID_TEST }}
          MARKETPLACE_PUSH_URL: ${{ secrets.IDM_MARKETPLACE_PUSH_DEV_URL }}
          MARKETPLACE_PUSH_USER: ${{ secrets.IDM_MARKETPLACE_PUSH_DEV_USERNAME }}
          MARKETPLACE_PUSH_PSWD: ${{ secrets.IDM_MARKETPLACE_PUSH_DEV_PASSWORD }}
          MARKETPLACE_PUSH_HEADER: ${{ secrets.IDM_MARKETPLACE_PUSH_DEV_HEADER }}
          MARKETPLACE_PUSH_TOKEN: ${{ secrets.IDM_MARKETPLACE_PUSH_DEV_TOKEN }}
          S3_WEATHERFORECAST_ACCESSKEY: ${{ secrets.S3_WEATHERFORECAST_ACCESSKEY }}
          S3_WEATHERFORECAST_SECRET: ${{ secrets.S3_WEATHERFORECAST_SECRET }}
          LTSAPI_IDM_USERNAME: ${{ secrets.LTSAPI_IDM_USERNAME }}
          LTSAPI_IDM_PASSWORD: ${{ secrets.LTSAPI_IDM_PASSWORD }}
          LTSAPI_IDM_XLTSCLIENTID: ${{ secrets.LTSAPI_IDM_XLTSCLIENTID }}
          LTSAPI_OPENDATA_USERNAME: ${{ secrets.LTSAPI_NOI_USERNAME }}
          LTSAPI_OPENDATA_PASSWORD: ${{ secrets.LTSAPI_NOI_PASSWORD }}
        run: |
          yq -i '
            .image.repository = strenv(IMAGE) |
            .image.tag = strenv(TAG) |
            .image.pullPolicy = "IfNotPresent" |

            .envSecret.ASPNETCORE_ConnectionStrings__PgConnection = strenv(PG_CONNECTION) |
            .envSecret.ASPNETCORE_MssConfig__Username = strenv(MSS_USER) |
            .envSecret.ASPNETCORE_MssConfig__Password = strenv(MSS_PSWD) |
            .envSecret.ASPNETCORE_LcsConfig__Username = strenv(LCS_USER) |
            .envSecret.ASPNETCORE_LcsConfig__Password = strenv(LCS_PSWD) |
            .envSecret.ASPNETCORE_LcsConfig__MessagePassword = strenv(LCS_MSGPSWD) |
            .envSecret.ASPNETCORE_SiagConfig__Username = strenv(SIAG_USER) |
            .envSecret.ASPNETCORE_SiagConfig__Password = strenv(SIAG_PSWD) |
            .envSecret.ASPNETCORE_S3ImageresizerConfig__BucketAccessPoint = strenv(S3_BUCKET_ACCESSPOINT) |
            .envSecret.ASPNETCORE_S3ImageresizerConfig__AccessKey = strenv(S3_IMAGEUPLOADER_ACCESSKEY) |
            .envSecret.ASPNETCORE_S3ImageresizerConfig__SecretKey = strenv(S3_IMAGEUPLOADER_SECRETKEY) |
            .envSecret.ASPNETCORE_ProxyConfig__CaddyTest = strenv(CADDY_TEST_IP) |
            .envSecret.ASPNETCORE_ProxyConfig__CaddyProd = strenv(CADDY_PROD_IP) |
            .envSecret.ASPNETCORE_ElasticSearchConfig__ElasticUrl = strenv(ELK_URL) |
            .envSecret.ASPNETCORE_ElasticSearchConfig__ElasticAuthtoken = strenv(ELK_TOKEN) |
            .envSecret.ASPNETCORE_RavenConfig__Username = strenv(RAVEN_USER) |
            .envSecret.ASPNETCORE_RavenConfig__Password = strenv(RAVEN_PSWD) |
            .envSecret.ASPNETCORE_FCMConfig__noi-communityapp__ServerKey = strenv(NOICOMMUNITY_SERVERKEY) |
            .envSecret.ASPNETCORE_FCMConfig__noi-communityapp__SenderId = strenv(NOICOMMUNITY_SENDERID) |
            .envSecret.ASPNETCORE_NotifierConfig__idm-marketplace__Url = strenv(MARKETPLACE_PUSH_URL) |
            .envSecret.ASPNETCORE_NotifierConfig__idm-marketplace__User = strenv(MARKETPLACE_PUSH_USER) |
            .envSecret.ASPNETCORE_NotifierConfig__idm-marketplace__Password = strenv(MARKETPLACE_PUSH_PSWD) |
            .envSecret.ASPNETCORE_NotifierConfig__idm-marketplace__Header = strenv(MARKETPLACE_PUSH_HEADER) |
            .envSecret.ASPNETCORE_NotifierConfig__idm-marketplace__Token = strenv(MARKETPLACE_PUSH_TOKEN) |
            .envSecret.ASPNETCORE_S3Config__dc-meteorology-province-forecast__AccessKey = strenv(S3_WEATHERFORECAST_ACCESSKEY) |
            .envSecret.ASPNETCORE_S3Config__dc-meteorology-province-forecast__AccessSecretKey = strenv(S3_WEATHERFORECAST_SECRET) |
            .envSecret.ASPNETCORE_LTSApiIDM__Username = strenv(LTSAPI_IDM_USERNAME) |
            .envSecret.ASPNETCORE_LTSApiIDM__Password = strenv(LTSAPI_IDM_PASSWORD) |
            .envSecret.ASPNETCORE_LTSApiIDM__XLSClientid = strenv(LTSAPI_IDM_XLTSCLIENTID) |
            .envSecret.ASPNETCORE_LTSApiOpen__Username = strenv(LTSAPI_OPENDATA_USERNAME) |
            .envSecret.ASPNETCORE_LTSApiOpen__Password = strenv(LTSAPI_OPENDATA_PASSWORD) |
            .envSecret.ASPNETCORE_LTSApiOpen__XLSClientid = strenv(LTSAPI_IDM_XLTSCLIENTID)
          ' infrastructure/helm/test.yaml

      - name: Deploy on cluster
        uses: noi-techpark/github-actions/helm-deploy@v2
        with:
          k8s-name: tourism-api
          k8s-namespace: core
          chart-path: infrastructure/helm/tourism-api
          values-file: infrastructure/helm/test.yaml
          aws-access-key-id: ${{ secrets[vars.AWS_KEY_ID] }}
          aws-secret-access-key: ${{ secrets[vars.AWS_KEY_SECRET] }}
          aws-eks-cluster-name: aws-main-eu-01
          aws-region: eu-west-1

      - name: Generate Json
        run: |
          curl "${{ env.API_URL }}STA/JsonPoi"
          curl "${{ env.API_URL }}STA/JsonAccommodation"
          curl "${{ env.API_URL }}ODH/AccommodationBooklist"
          curl "${{ env.API_URL }}ODH/AccommodationFulllist"
          curl "${{ env.API_URL }}ODH/Taglist"
          curl "${{ env.API_URL }}ODH/OdhTagAutoPublishlist"
          curl "${{ env.API_URL }}ODH/OdhTagCategorieslist"
          curl "${{ env.API_URL }}ODH/WeatherForecast"

  deploy-prod-api:
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/prod'
    env:
      API_URL: "https://tourism.api.opendatahub.com/v1/"
    needs: test
    concurrency: deploy-prod-api
    steps:
      - name: Checkout source code
        uses: actions/checkout@v2
        with:
          submodules: true

      - name: Create .env file
        uses: noi-techpark/github-actions/env-file@v2
        env:
          X_COMPOSE_PROJECT_NAME: ${{ env.PROJECT_NAME }}
          X_DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          X_DOCKER_TAG: ${{ env.DOCKER_TAG }}
          X_SERVER_PORT: 1011

          X_ASPNETCORE_ENVIRONMENT: "Production"
          X_PG_CONNECTION: ${{ secrets.PG_CONNECTION_PROD }}
          X_MSS_USER: ${{ secrets.MSS_USER_TEST }}
          X_MSS_PSWD: ${{ secrets.MSS_PSWD_TEST }}
          X_MSS_SERVICEURL: "https://www.easymailing.eu/mss/mss_service.php"
          X_LCS_USER: ${{ secrets.LCS_USER_TEST }}
          X_LCS_PSWD: ${{ secrets.LCS_PSWD_TEST }}
          X_LCS_MSGPSWD: ${{ secrets.LCS_MSGPSWD_TEST }}
          X_LCS_SERVICEURL: "https://lcs.lts.it/api/data.svc"
          X_CDB_USER: ${{ secrets.CDB_USER_TEST }}
          X_CDB_PSWD: ${{ secrets.CDB_PSWD_TEST }}
          X_CDB_SERVICEURL: "https://lcs.lts.it/data/cdbdata.asmx"
          X_SIAG_USER: ${{ secrets.SIAG_USER_TEST }}
          X_SIAG_PSWD: "http://daten.buergernetz.bz.it/services/weather/"
          X_SIAG_SERVICEURL: ${{ secrets.SIAG_URL_TEST }}
          X_XMLDIR: ${{ secrets.XMLDIR_TEST }}
          X_IMG_URL: "https://cdn.opendatahub.com/api/Image/GetImage?imageurl="
          X_DOC_URL: "https://cdn.opendatahub.com/api/File/GetFile/"
          X_S3_BUCKET_ACCESSPOINT: ${{ secrets.S3_BUCKET_ACCESSPOINT_TEST }}
          X_S3_IMAGEUPLOADER_ACCESSKEY: ${{ secrets.S3_IMAGEUPLOADER_ACCESSKEY_TEST }}
          X_S3_IMAGEUPLOADER_SECRETKEY: ${{ secrets.S3_IMAGEUPLOADER_SECRETKEY_TEST }}
          X_OAUTH_AUTORITY: "https://auth.opendatahub.com/auth/realms/noi/"
          X_CADDY_TEST_IP: ${{ secrets.CADDY_TEST_IP }}
          X_CADDY_PROD_IP: ${{ secrets.CADDY_PROD_IP }}
          X_ELK_URL: ${{ secrets.ELK_URL_TEST }}
          X_ELK_TOKEN: ${{ secrets.ELK_TOKEN_TEST }}
          X_JSONPATH: "./wwwroot/json/"
          X_DATABROWSER_URL: "https://databrowser.opendatahub.com/"
          X_RAVEN_SERVICEURL: "https://service.suedtirol.info/api/"
          X_RAVEN_USER: ${{ secrets.RAVEN_USER_TEST }}
          X_RAVEN_PSWD: ${{ secrets.RAVEN_PSWD_TEST }}
          X_API_URL: ${{ env.API_URL }}
          X_NOICOMMUNITY_SERVERKEY: ${{ secrets.NOICOMMUNITY_SERVERKEY_TEST }}
          X_NOICOMMUNITY_SENDERID: ${{ secrets.NOICOMMUNITY_SENDERID_TEST }}
          X_NOICOMMUNITY_PROJECTNAME: "noi-community"
          X_NOICOMMUNITY_FCMSERVICEACCOUNT: "google-service-account.noicommunity.json"
          X_S3_WEATHERFORECAST_FILENAME: "SMOS_MCPL-WX_EXP_SIAG.JSON"
          X_S3_WEATHERFORECAST_ACCESSKEY: ${{ secrets.S3_WEATHERFORECAST_ACCESSKEY }}
          X_S3_WEATHERFORECAST_SECRET: ${{ secrets.S3_WEATHERFORECAST_SECRET }}
          X_MARKETPLACE_PUSH_URL: ${{ secrets.IDM_MARKETPLACE_PUSH_PROD_URL }}
          X_MARKETPLACE_PUSH_USER: ${{ secrets.IDM_MARKETPLACE_PUSH_PROD_USERNAME }}
          X_MARKETPLACE_PUSH_PSWD: ${{ secrets.IDM_MARKETPLACE_PUSH_PROD_PASSWORD }}
          X_MARKETPLACE_PUSH_HEADER: ${{ secrets.IDM_MARKETPLACE_PUSH_PROD_HEADER }}
          X_MARKETPLACE_PUSH_TOKEN: ${{ secrets.IDM_MARKETPLACE_PUSH_PROD_TOKEN }}
          X_LTSAPI_IDM_XLTSCLIENTID: ${{ secrets.LTSAPI_IDM_XLTSCLIENTID }}
          X_LTSAPI_IDM_SERVICEURL: "https://go.lts.it/api/v1"
          X_LTSAPI_IDM_USERNAME: ${{ secrets.LTSAPI_IDM_USERNAME }}
          X_LTSAPI_IDM_PASSWORD: ${{ secrets.LTSAPI_IDM_PASSWORD }}
          X_LTSAPI_IDM_OPENDATA: false
          X_LTSAPI_OPENDATA_XLTSCLIENTID: ${{ secrets.LTSAPI_IDM_XLTSCLIENTID }}
          X_LTSAPI_OPENDATA_SERVICEURL: "https://go.lts.it/api/v1"
          X_LTSAPI_OPENDATA_USERNAME: ${{ secrets.LTSAPI_NOI_USERNAME }}
          X_LTSAPI_OPENDATA_PASSWORD: ${{ secrets.LTSAPI_NOI_PASSWORD }}
          X_LTSAPI_OPENDATA_OPENDATA: true

      - name: Setup config
        run: |
              echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_NOICOMMUNITY }}" > google-service-account.noicommunity.json
              chmod +r google-service-account.noicommunity.json

      - name: Build and push
        uses: noi-techpark/github-actions/docker-build-and-push@v2
        with:
          docker-username: ${{ github.actor }}
          docker-password: ${{ secrets.GITHUB_TOKEN }}
          working-directory: OdhApiCore
          docker-compose-file: docker-compose.yml

      - name: Deploy application
        uses: noi-techpark/github-actions/docker-deploy@v2
        with:
          hosts: 'prod'
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          docker-username: 'noi-techpark-bot'
          docker-password: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          project-name: ${{ env.PROJECT_NAME }}

      - name: Generate Json
        run: |
          curl "${{ env.API_URL }}STA/JsonPoi"
          curl "${{ env.API_URL }}STA/JsonAccommodation"
          curl "${{ env.API_URL }}ODH/AccommodationBooklist"
          curl "${{ env.API_URL }}ODH/AccommodationFulllist"
          curl "${{ env.API_URL }}ODH/Taglist"
          curl "${{ env.API_URL }}ODH/OdhTagAutoPublishlist"
          curl "${{ env.API_URL }}ODH/OdhTagCategorieslist"
          curl "${{ env.API_URL }}ODH/WeatherForecast"
