{{- if .Values.envSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tourism-api.envSecretName" . }}
  labels:
    {{- include "tourism-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.envSecret }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
