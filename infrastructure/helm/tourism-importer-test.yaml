# Test environment values for the tourism-importer chart.
#
# Non-secret configuration lives here (committed). Sensitive values are listed under
# `envSecret` with empty placeholders and are filled in at deploy time by the GitHub
# Actions workflow (yq) from repository secrets, then rendered into a K8s Secret.
#
# image.repository / image.tag / image.pullPolicy are also overwritten by the workflow.

image:
  repository: ghcr.io/noi-techpark/opendatahub-content-api/opendatahub-content-api-importer
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: container-registry-r

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetport: http
  containerport: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
  tls:
    - hosts:
        - tourism.importer.opendatahub.testingmachine.eu
      secretName: tls-tourism-importer
  hosts:
    - host: tourism.importer.opendatahub.testingmachine.eu
      paths:
        - path: "/"
          pathType: Prefix

# Non-secret environment (mirrors infrastructure/docker-compose.importer.run.yml).
env:
  ASPNETCORE_URLS: "http://+:80"
  ASPNETCORE_ENVIRONMENT: "Development"

  ASPNETCORE_MssConfig__ServiceUrl: "https://www.easymailing.eu/mss/mss_service.php"
  ASPNETCORE_LcsConfig__ServiceUrl: "https://lcs.lts.it/api/data.svc"
  ASPNETCORE_SiagConfig__ServiceUrl: "http://daten.buergernetz.bz.it/services/weather/"
  ASPNETCORE_DSSConfig__ServiceUrl: "https://www.dolomitisuperski.com/jsonexport/export/"
  ASPNETCORE_SuedtirolWeinConfig__ServiceUrl: "https://suedtirolwein.secure.consisto.net/"
  ASPNETCORE_MusportConfig__ServiceUrl: "https://musport.prov.bz.it/musport/services/MuseumsService/"
  ASPNETCORE_NinjaConfig__ServiceUrl: "https://mobility.api.opendatahub.com/v2/flat/"

  # Sources configured with empty user/password in the current deployment.
  ASPNETCORE_FeratelConfig__Username: ""
  ASPNETCORE_FeratelConfig__Password: ""
  ASPNETCORE_PanocloudConfig__Username: ""
